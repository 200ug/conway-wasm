<html>
  <head>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="main.css" />
    <script src="wasm_exec.js"></script>
    <script>
      const go = new Go()
      WebAssembly.instantiateStreaming(fetch("conway.wasm"), go.importObject).then((result) => {
          go.run(result.instance)
      })
    </script>
  </head>
  <body>
    <canvas id="conway-bg"></canvas>
    <div id="content">
      <!-- page content here -->
      <button id="conway-toggle">Start</button>
    </div>
  </body>
</html>
